spring.main.allow-circular-references=false
spring.application.name=hr.system

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hr_system}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.clean-on-validation-error=true
spring.flyway.clean-disabled=false

# Strategy flag for /api/job_data query flow: 'jpa' (default) or 'jdbc'
app.jobdata.query.strategy=jpa
# To use JDBC Template based querying, set:
# app.jobdata.query.strategy=jdbc

# Default pagination for Job Data queries
app.jobdata.page.default=0
app.jobdata.size.default=10

# Default profile fallback
spring.profiles.default=dev

# Logging
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
